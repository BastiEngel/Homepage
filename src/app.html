<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Preconnect to font CDNs to remove DNS/TLS latency from critical path -->
		<link rel="preconnect" href="https://use.typekit.net" crossorigin />
		<link rel="preconnect" href="https://p.typekit.net" crossorigin />
		<link rel="stylesheet" href="https://use.typekit.net/rrn1wdp.css">
		<!-- Preload primary self-hosted font — eliminates FOUT on first paint -->
		<link rel="preload" href="/fonts/sligoil-main/fonts/web/Sligoil-Micro.woff2" as="font" type="font/woff2" crossorigin />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="viewport">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
